set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @yank_action 'copy-pipe-no-clear'

run '~/.config/tmux/plugins/tpm/tpm'

# tmux 3.7 draws prompts/messages as a status-line overlay instead of
# replacing the line; without a concrete `fill` colour the status content
# shows through and the prompt input lands on the window tabs. Catppuccin
# v2.1.3 predates this — re-set the styles here (must come after `run tpm`,
# which is when catppuccin applies its own). Drop once catppuccin/tmux#600
# ships a fix. The fill hex matches the WezTerm nightfox background
# (config/wezterm/utils/appearance.lua `active.theme`) so the blanked bar
# blends into the terminal — update it if the WezTerm theme changes.
set -gF message-style 'fg=#{@thm_teal},bg=default,fill=#192330'
set -gF message-command-style 'fg=#{@thm_teal},bg=default,fill=#192330'
