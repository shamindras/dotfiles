unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -a -c "#{pane_current_path}"

bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Detect vim/nvim/fzf in pane; forward C-hjkl to them, otherwise select tmux pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind x kill-pane
bind K send-keys C-l \; clear-history
# Unbind old single-key bindings now handled by key tables
unbind s
unbind S
unbind X
unbind g

# Session navigation — N (Navigate) key table
bind N switch-client -T navigate
bind -T navigate s display-popup -E -w 40% -h 40% \
  'sesh connect "$(
    sesh list -c | fzf \
      --no-sort \
      --border-label " sesh " \
      --prompt "config> " \
      --header "^a all / ^t tmux / ^g config / ^x zoxide / ^d kill" \
      --bind "tab:down,btab:up" \
      --bind "ctrl-a:change-prompt(all> )+reload(sesh list)" \
      --bind "ctrl-t:change-prompt(tmux> )+reload(sesh list -t)" \
      --bind "ctrl-g:change-prompt(config> )+reload(sesh list -c)" \
      --bind "ctrl-x:change-prompt(zoxide> )+reload(sesh list -z)" \
      --bind "ctrl-d:execute(tmux kill-session -t {})+change-prompt(tmux> )+reload(sesh list -t)"
  )"'
bind -T navigate w display-popup -E -w 40% -h 40% ~/.config/bin/tmux-session-picker
bind -T navigate n new-session
bind -T navigate k confirm-before -p "Kill session #S? (y/n)" kill-session
bind -T navigate j switch-client -l
bind -T navigate h switch-client -p
bind -T navigate l switch-client -n
bind -T navigate e command-prompt -I "#S" "rename-session '%%'"
bind , command-prompt -I "#{window_name}" "rename-window '%%'"
bind < swap-window -t -1 \; previous-window
bind > swap-window -t +1 \; next-window
bind a last-window

# Vi-style pane resize (repeatable, 5-unit)
# M-hjkl: direct terminal use
# M-Arrow: WezTerm CMD+SHIFT+Arrow passthrough target (see keybindings-reference.md)
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Arrow-key aliases for WezTerm CMD+SHIFT+Arrow passthrough
# (explicitly defined — do not rely on tmux-sensible for these)
bind -r M-Left  resize-pane -L 5
bind -r M-Down  resize-pane -D 5
bind -r M-Up    resize-pane -U 5
bind -r M-Right resize-pane -R 5

# Tool launchers — O (Open) key table
bind O switch-client -T open
bind -T open g display-popup -E -w 100% -h 100% -d "#{pane_current_path}" lazygit
bind -T open y run-shell "~/.config/tmux/scripts/next-tool-window.sh yazi yazi"
bind -T open i if-shell "tmux list-windows -F '#W' | grep -qx items" \
  "select-window -t items" \
  "new-window -a -n items taskwarrior-tui"
bind -T open b new-window -a -n btm -c "#{pane_current_path}" ~/.config/bin/btm-popup
bind -T open C run-shell "~/.config/tmux/scripts/next-tool-window.sh claude claude"
bind -T open c split-window -h -l 50% -c "#{pane_current_path}" claude
bind -T open u run-shell -b "~/.local/share/tmux/plugins/tmux-fzf-url/fzf-url.sh '' screen ''"
