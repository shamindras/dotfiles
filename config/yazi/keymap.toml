# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

# Only customizations — yazi merges these with its embedded preset keymap.
# See: https://yazi-rs.github.io/docs/configuration/keymap/

[mgr]
prepend_keymap = [
  # Plugin: jump via zoxide / fzf
  { on = "z", run = "plugin zoxide",        desc = "Jump to a directory via zoxide" },
  { on = "Z", run = "plugin fzf",           desc = "Jump to a file/directory via fzf" },

  # Plugin: flavor picker (hand-rolled, see plugins/flavor-picker.yazi)
  { on = "F", run = "plugin flavor-picker", desc = "Pick a flavor via fzf" },

  # Plugin: smart-enter (cd into dirs, open files)
  { on = "<Enter>", run = "plugin smart-enter", desc = "Enter directory / open file" },

  # Plugin: ouch compress/decompress
  { on = "C", run = "plugin ouch", desc = "Compress with ouch" },

  # Plugin: relative-motions — digits 1-9 trigger count motions (3j, 5dd, etc.)
  { on = "1", run = "plugin relative-motions 1", desc = "Move in relative steps" },
  { on = "2", run = "plugin relative-motions 2", desc = "Move in relative steps" },
  { on = "3", run = "plugin relative-motions 3", desc = "Move in relative steps" },
  { on = "4", run = "plugin relative-motions 4", desc = "Move in relative steps" },
  { on = "5", run = "plugin relative-motions 5", desc = "Move in relative steps" },
  { on = "6", run = "plugin relative-motions 6", desc = "Move in relative steps" },
  { on = "7", run = "plugin relative-motions 7", desc = "Move in relative steps" },
  { on = "8", run = "plugin relative-motions 8", desc = "Move in relative steps" },
  { on = "9", run = "plugin relative-motions 9", desc = "Move in relative steps" },

  # Tab switching rebound to g1-g9 (digits 1-9 now drive relative-motions)
  { on = ["g", "1"], run = "tab_switch 0", desc = "Switch to the 1st tab" },
  { on = ["g", "2"], run = "tab_switch 1", desc = "Switch to the 2nd tab" },
  { on = ["g", "3"], run = "tab_switch 2", desc = "Switch to the 3rd tab" },
  { on = ["g", "4"], run = "tab_switch 3", desc = "Switch to the 4th tab" },
  { on = ["g", "5"], run = "tab_switch 4", desc = "Switch to the 5th tab" },
  { on = ["g", "6"], run = "tab_switch 5", desc = "Switch to the 6th tab" },
  { on = ["g", "7"], run = "tab_switch 6", desc = "Switch to the 7th tab" },
  { on = ["g", "8"], run = "tab_switch 7", desc = "Switch to the 8th tab" },
  { on = ["g", "9"], run = "tab_switch 8", desc = "Switch to the 9th tab" },
]
