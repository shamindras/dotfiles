[[session]]
name = "play"
path = "~/Dropbox/repos/codebox"
startup_command = "~/.config/sesh/scripts/play.sh"

[[session]]
name = "dots"
path = "~/Dropbox/repos/dotfiles"
startup_command = "~/.config/sesh/scripts/dots.sh"

[[session]]
name = "career"
path = "~/Dropbox/repos/ss_applications"
startup_command = "~/.config/sesh/scripts/career.sh"

[[session]]
name = "blog"
path = "~/Dropbox/repos/ss_personal_quarto_blog"
startup_command = "~/.config/sesh/scripts/blog.sh"

[[session]]
name = "notes"
path = "~/Dropbox/notes/zk"
startup_command = "~/.config/sesh/scripts/notes.sh"

[[session]]
name = "feed"
path = "~/Downloads"
startup_command = "~/.config/sesh/scripts/feed.sh"

# Applies ONLY to sessions with no [[session]] entry above (ad-hoc
# directories from sesh-dir-picker or zoxide connects). Per-session
# startup_command wins; opt a session out with disable_startup_command.
[default_session]
startup_command = "~/.config/sesh/scripts/default.sh"
