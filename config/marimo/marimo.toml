[completion]
copilot = false
signature_hint_on_typing = true
activate_on_typing = true

[server]
browser = "default"
follow_symlink = false

[language_servers.ty]
enabled = false

[language_servers.pylsp]
enable_pydocstyle = false
enable_flake8 = false
enable_mypy = true
enable_pylint = false
enable_pyflakes = false
enable_ruff = true
enabled = false

[ai]
rules = ""
mode = "manual"
inline_tooltip = false

[ai.open_ai]

[ai.custom_providers]

[ai.models]
chat_model = "anthropic/claude-sonnet-4-5"
displayed_models = []
edit_model = "anthropic/claude-opus-4-6"
custom_models = []

[ai.anthropic]
api_key = ""

[ai.google]

[keymap]
destructive_delete = true
preset = "vim"

[keymap.overrides]
"command.vimEnterCommandMode" = "Escape"
# Firefox claims Cmd-Shift-{J,K,G} for devtools/find; rebind to Ctrl-Shift-*
"cell.focusDown" = "Ctrl-Shift-j"
"cell.focusUp" = "Ctrl-Shift-k"
"global.focusTop" = "Ctrl-Shift-f"
"global.focusBottom" = "Ctrl-Shift-g"

[save]
format_on_save = true
autosave = "after_delay"
autosave_delay = 1000

[diagnostics]
sql_linter = true

[runtime]
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
default_csv_encoding = "utf-8"
default_sql_output = "auto"
on_cell_change = "autorun"
auto_reload = "autorun"
reactive_tests = true
output_max_bytes = 8000000
default_auto_download = []
auto_instantiate = true

[experimental]
external_agents = false

[display]
cell_output = "above"
dataframes = "rich"
default_table_page_size = 10
theme = "light"
code_editor_font_size = 20
default_width = "full"
default_table_max_columns = 50
reference_highlighting = true

[formatting]
line_length = 79

[mcp]
presets = []

[mcp.mcpServers]

[package_management]
manager = "uv"

[snippets]
custom_paths = []
include_default_snippets = true
