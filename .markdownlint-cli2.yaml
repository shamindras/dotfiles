# markdownlint-cli2 config for the dotfiles repo.
# Aligns line length with prettier (.prettierrc.yaml: printWidth = 120).
# MD041 left at its default (enabled) so README/CLAUDE.md files are
# required to start with an H1.
config:
  MD013:
    line_length: 120
    code_blocks: false
    tables: false
  MD033: false
