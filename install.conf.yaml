# set dotbot defaults
- defaults:
    link:
      create: true
      relink: true
    shell:
      stdin: true
      stdout: true
      stderr: true

# Create XDG directories
- create:
    - "${XDG_BIN_HOME}"
    - "${XDG_CONFIG_HOME}"
    - "${XDG_CACHE_HOME}"
    - "${XDG_DATA_HOME}"
    - "${XDG_STATE_HOME}"
    - "${XDG_RUNTIME_DIR}"
    - "${XDG_PROJECTS_DIR}"
    - "${XDG_DATA_HOME}/r"
    - "${XDG_DATA_HOME}/tmux/plugins"
    - "${XDG_DATA_HOME}/tmux/resurrect"

# remove existing symlinks
- clean:
    ~/:
      force: true
    ~/.config:
      force: true

# Install zk (zettlekasten)
- shell:
    - command: ./scripts/setup-zk
      description: Setup zk (zettlekasten)

# Symlink locations for files / directories
- link:
    # XDG_CONFIG_HOME configs
    ${HOME}/.zshenv: config/zsh/.zshenv
    ${XDG_CONFIG_HOME}/aerospace: config/aerospace
    ${XDG_CONFIG_HOME}/atuin: config/atuin
    ${XDG_CONFIG_HOME}/bat: config/bat
    ${XDG_CONFIG_HOME}/borders: config/borders
    ${XDG_CONFIG_HOME}/bin: config/bin
    ${XDG_CONFIG_HOME}/bottom: config/bottom
    ${XDG_CONFIG_HOME}/btop: config/btop
    ${CURL_HOME}/.curlrc: config/curl/curlrc
    ${XDG_CONFIG_HOME}/delta: config/delta
    ${XDG_CONFIG_HOME}/fastfetch: config/fastfetch
    ${XDG_CONFIG_HOME}/gh: config/gh
    ${XDG_CONFIG_HOME}/gh-dash: config/gh-dash
    ${XDG_CONFIG_HOME}/ghostty: config/ghostty
    ${XDG_CONFIG_HOME}/git: config/git
    ${XDG_CONFIG_HOME}/glow: config/glow
    ${XDG_CONFIG_HOME}/kanata: config/kanata
    ${XDG_CONFIG_HOME}/lazygit: config/lazygit
    ${XDG_CONFIG_HOME}/marimo: config/marimo
    ${XDG_CONFIG_HOME}/newsboat: config/newsboat
    ${XDG_CONFIG_HOME}/npm: config/npm
    ${XDG_CONFIG_HOME}/nvim: config/nvim
    ${XDG_CONFIG_HOME}/parallel: config/parallel
    ${XDG_CONFIG_HOME}/python: config/python
    ${XDG_CONFIG_HOME}/ripgrep: config/ripgrep
    ${XDG_CONFIG_HOME}/rstudio: config/rstudio
    ${XDG_CONFIG_HOME}/sesh: config/sesh
    ${XDG_CONFIG_HOME}/sketchybar: config/sketchybar
    ${XDG_CONFIG_HOME}/starship: config/starship
    ${XDG_CONFIG_HOME}/surfingkeys: config/surfingkeys
    ${XDG_CONFIG_HOME}/stylua: config/stylua
    ${XDG_CONFIG_HOME}/tealdeer: config/tealdeer
    ${XDG_CONFIG_HOME}/task: config/task
    ${XDG_CONFIG_HOME}/tmux: config/tmux
    ${XDG_CONFIG_HOME}/tmux/plugins/tpm: submods/plugins/tpm
    ${XDG_CONFIG_HOME}/wezterm: config/wezterm
    ${XDG_CONFIG_HOME}/wget: config/wget
    ${XDG_CONFIG_HOME}/yazi: config/yazi
    ${XDG_CONFIG_HOME}/zk: config/zk
    ${XDG_CONFIG_HOME}/zsh: config/zsh

    # ssh
    ${XDG_CONFIG_HOME}/ssh: config/ssh
    ${HOME}/.ssh/config: ${XDG_CONFIG_HOME}/ssh/config

    # Application support configs
    ${HOME}/Library/Application Support/espanso: config/espanso
    ${HOME}/Library/Application Support/Code/User/keybindings.json: config/vscode/keybindings.json
    ${HOME}/Library/Application Support/Code/User/settings.json: config/vscode/settings.json

# Make sketchybar plugins executable
- shell:
    - command: chmod -R +x ${XDG_CONFIG_HOME}/sketchybar/plugins/
      description: Make sketchybar plugins executable
      stdin: ''
      stdout: true
      stderr: true

# Install homebrew
- shell:
    - command: ./scripts/setup-upgrade-homebrew
      description: Installing homebrew

# Canonical brew pipeline: sudo bootstrap → mode detect → dump (steady) →
# update → upgrade --greedy (tolerant) → bundle install (recovery +
# bootstrap) → cleanup → emoji summary. Replaces the previous
# upgrade-then-brewfile two-step (bundle install now runs inside the script).
# stdin: true is required so sudo -v can prompt for the password.
- shell:
    - command: ./config/bin/brew-update
      description: Running brew-update pipeline (bootstrap-aware, pkg-cask recovery)
      stdin: true
      stdout: true
      stderr: true

# Update bat themes cache
# NOTE: here we prefix with `command` to use the original `bat` command, without any alias.
- shell:
    - command: command bat cache --build
      description: Build bat cache

# Start borders and sketchybar as brew services (launchd: RunAtLoad + KeepAlive)
- shell:
    - command: brew services start borders
      description: Start borders as a brew service
    - command: brew services start sketchybar
      description: Start sketchybar as a brew service

# Load espanso extension
- shell:
    - command: espanso service register
      description: register espanso app

# Setup Firefox user.js, userChrome.css, and policies.json
- shell:
    - command: ./scripts/setup-firefox
      description: Setup Firefox user.js, userChrome.css, and policies.json

# Install gh-dash extension
- shell:
    - command: gh extension install dlvhdr/gh-dash
      description: install gh-dash extension

# Upgrade gh-dash extension
- shell:
    - command: gh extension upgrade --all
      description: upgrade gh extensions

# kanata (keyboard remapper with cmd feature — built from source)
- shell:
    - command: ./scripts/setup-upgrade-kanata
      description: install kanata with cmd feature, or upgrade

# Install npm packages
- shell:
    - command: npm install -g eslint_d prettier
      description: install eslint_d and prettier using npm

# Create R user library dir (version-specific; R must be installed first)
- shell:
    - command: >-
        R_VER=$(R --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+' | head -1) &&
        mkdir -p "${XDG_DATA_HOME}/r/library/${R_VER}"
      description: Create R version-specific user library directory

# rust + cargo
- shell:
    - command: ./scripts/setup-upgrade-rust-cargo
      description: install rust and cargo, or upgrade both

# Update tldr cache
- shell:
    - command: tldr --update
      description: Update tldr

# ---- TUI tool plugin installs (require host tools from Brewfile) ----

# Pre-install treesitter parsers from ensure_installed (prevents race)
- shell:
    - command: ./scripts/setup-nvim-treesitter
      description: Pre-install treesitter parsers

# Install yazi plugins + flavors (idempotent via package.toml)
- shell:
    - command: ya pkg install
      description: Install yazi plugins and flavors via ya pkg

# Install tmux plugins via TPM
- shell:
    - command: >-
        [ -x "${XDG_CONFIG_HOME}/tmux/plugins/tpm/bin/install_plugins" ] &&
        "${XDG_CONFIG_HOME}/tmux/plugins/tpm/bin/install_plugins" || true
      description: Install tmux plugins via TPM

# Load ttyper
- shell:
    - command: ./scripts/setup-upgrade-ttyper
      description: install ttyper, or upgrade to the latest version

# macOS default settings
- shell:
    - command: ./scripts/setup-macos
      description: Set macOS default settings
